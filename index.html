<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIP Index</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
<style>
body{font-family:system-ui;margin:20px;background:#0b0b0b;color:#fff}
button{margin:4px;padding:6px 10px;border-radius:6px;border:none;background:#ffe500;color:#000;font-weight:600}
canvas{max-width:900px;margin-top:20px}
.card{background:#161616;padding:16px;border-radius:12px;margin-bottom:20px}
</style>
</head>
<body>

<h2>BIP Index Tool</h2>

<div class="card">
<h3>Upload Data</h3>
<input type="file" id="csvUpload" accept=".csv">
<input type="file" id="pdfUpload" accept="application/pdf">
</div>

<div class="card">
<h3>Season BIP %</h3>
<button data-type="full">Full</button>
<button data-type="1st">1st Half</button>
<button data-type="2nd">2nd Half</button>
<canvas id="bipChart"></canvas>
</div>

<div class="card">
<h3>Median BOP Duration</h3>
<canvas id="medianChart"></canvas>
</div>

<script>
const STORAGE_KEY="bipData_v1";

let bipData=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];

function save(){
 localStorage.setItem(STORAGE_KEY,JSON.stringify(bipData));
}

function median(arr){
 if(!arr.length)return 0;
 arr=[...arr].sort((a,b)=>a-b);
 const m=Math.floor(arr.length/2);
 return arr.length%2?arr[m]:(arr[m-1]+arr[m])/2;
}

function bipPercent(d){
 return (d.bip_seconds/d.match_seconds)*100;
}

function filter(type){
 if(type==='full')return bipData;
 return bipData.filter(x=>x.half===type);
}

function renderCharts(type='full'){
 const f=filter(type);

 const labels=f.map(x=>x.match_id);
 const bipVals=f.map(x=>bipPercent(x));

 bipChart.data.labels=labels;
 bipChart.data.datasets[0].data=bipVals;
 bipChart.update();

 const med=f.map(x=>median(x.bop_events||[]));

 medianChart.data.labels=labels;
 medianChart.data.datasets[0].data=med;
 medianChart.update();
}

const bipChart=new Chart(document.getElementById('bipChart'),{
 type:'line',
 data:{labels:[],datasets:[{label:'BIP %',data:[]}]} 
});

const medianChart=new Chart(document.getElementById('medianChart'),{
 type:'line',
 data:{labels:[],datasets:[{label:'Median BOP (s)',data:[]}]} 
});

// toggle buttons

document.querySelectorAll('button[data-type]').forEach(btn=>{
 btn.onclick=()=>renderCharts(btn.dataset.type);
});

// CSV upload example structure

document.getElementById('csvUpload').addEventListener('change',async e=>{
 const text=await e.target.files[0].text();

 const rows=text.split('\n').slice(1);

 rows.forEach(r=>{
  const [match_id,half,bip_seconds,match_seconds]=r.split(',');

  bipData.push({
   match_id,
   half,
   bip_seconds:+bip_seconds,
   match_seconds:+match_seconds,
   bop_events:[]
  });

 });

 save();
 renderCharts();
});

// PDF reader basic parser

document.getElementById('pdfUpload').addEventListener('change',async e=>{
 const file=e.target.files[0];
 const buffer=await file.arrayBuffer();
 const pdf=await pdfjsLib.getDocument(buffer).promise;

 let text='';

 for(let i=1;i<=pdf.numPages;i++){
  const page=await pdf.getPage(i);
  const content=await page.getTextContent();
  text+=content.items.map(x=>x.str).join(' ');
 }

 const bip=text.match(/Ball In Play\s*(\d+:\d+)/i);

 if(bip){
  alert('Detected BIP '+bip[1]);
 }

});

renderCharts();
</script>

</body>
</html>
